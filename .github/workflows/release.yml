name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executables
        run: |
          pyinstaller --name "Gemini_CLI_Transcriber" --onefile audio_transcriber.py

      - name: Download FFmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_extracted"

      - name: Prepare Release Archive
        run: |
          mkdir release_package
          copy dist\Gemini_CLI_Transcriber.exe release_package\
          copy run_transcriber.bat release_package\
          copy run_screen_recorder.bat release_package\
          copy ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe release_package\
          copy ffmpeg_extracted\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe release_package\
          copy manual.pdf release_package\
          copy manual_EN.pdf release_package\
          copy README.md release_package\
          copy .env.example release_package\
          Compress-Archive -Path release_package\* -DestinationPath Gemini-Voice-Transcriber-Windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Gemini-Voice-Transcriber-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
